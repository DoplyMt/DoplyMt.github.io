<template>
  <div class="min-h-screen bg-gray-50 p-6 font-sans">
    <div class="max-w-7xl mx-auto bg-white rounded-2xl shadow-xl overflow-hidden border border-gray-100">
      
      <!-- 头部区域 -->
      <div class="bg-gradient-to-r py-6 px-8 text-white flex flex-col sm:flex-row justify-between items-center gap-4" style="background-image: linear-gradient(135deg, #667eea 0%, #764ba2 100%);">
        <div>
          <h1 class="text-3xl font-extrabold tracking-wide">我的个性化课程表</h1>
          <p class="text-indigo-100 text-sm mt-1">高效管理你的学习时间轴</p>
        </div>
        <button 
          @click="isModalOpen = true" 
          class="bg-white text-indigo-600 px-5 py-2.5 rounded-xl font-bold shadow-md hover:bg-indigo-50 transition-all duration-200 transform hover:-translate-y-0.5"
        >
          + 添加新课程
        </button>
      </div>

      <!-- 快捷工具栏 -->
      <div class="p-4 bg-gray-50 border-b border-gray-100 flex justify-between items-center text-sm text-gray-600">
        <div>📅 2026学年秋季学期</div>
        <div class="flex items-center gap-2">
          <span class="inline-block w-3 h-3 bg-indigo-500 rounded-full"></span> 必修课
          <span class="inline-block w-3 h-3 bg-emerald-500 rounded-full ml-2"></span> 选修课
        </div>
      </div>

      <!-- 课表主体表格 -->
      <div class="overflow-x-auto">
        <table class="w-full table-fixed min-w-[800px]">
          <!-- 表头：星期 -->
          <thead>
            <tr class="bg-gray-100 text-gray-700">
              <th class="w-24 p-4 text-center font-semibold border-b border-gray-200">时间/节次</th>
              <th v-for="day in days" :key="day.value" class="p-4 text-center font-bold border-b border-gray-200 text-sm">
                {{ day.label }}
              </th>
            </tr>
          </thead>
          
          <!-- 表体：节次 -->
          <tbody>
            <tr v-for="(slot, slotIdx) in timeSlots" :key="slotIdx" class="hover:bg-gray-50/50 transition-colors">
              <!-- 左侧节次与时间 -->
              <td class="p-3 text-center border-r border-b border-gray-200 bg-gray-50/50">
                <div class="font-bold text-gray-800 text-sm">第 {{ slotIdx + 1 }} 节</div>
                <div class="text-xs text-gray-400 mt-0.5">{{ slot.start }} - {{ slot.end }}</div>
              </td>
              
              <!-- 核心课程网格 -->
              <td v-for="day in days" :key="day.value" class="p-2 border-r border-b border-gray-200 relative align-top h-28">
                <div v-if="getCourse(day.value, slotIdx + 1)" 
                     :class="[
                       'group p-3 rounded-xl h-full shadow-sm flex flex-col justify-between text-white transition-all duration-200 hover:shadow-md',
                       getCourse(day.value, slotIdx + 1).type === 'required' ? 'bg-indigo-500 hover:bg-indigo-600' : 'bg-emerald-500 hover:bg-emerald-600'
                     ]"
                >
                  <div>
                    <div class="font-bold text-sm truncate">{{ getCourse(day.value, slotIdx + 1).name }}</div>
                    <div class="text-xs opacity-90 mt-1 flex items-center gap-1">
                      📍 {{ getCourse(day.value, slotIdx + 1).room }}
                    </div>
                  </div>
                  <div class="flex justify-between items-center mt-2">
                    <span class="text-[10px] bg-white/20 px-1.5 py-0.5 rounded font-mono">👨‍🏫 {{ getCourse(day.value, slotIdx + 1).teacher }}</span>
                    <!-- 删除按钮 (悬浮可见) -->
                    <button 
                      @click="deleteCourse(day.value, slotIdx + 1)" 
                      class="opacity-0 group-hover:opacity-100 text-white hover:text-red-200 transition-opacity text-xs p-1"
                      title="删除课程"
                    >
                      🗑️
                    </button>
                  </div>
                </div>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>

    <!-- 添加课程的弹窗组件 (Modal) -->
    <div v-if="isModalOpen" class="fixed inset-0 bg-black/50 backdrop-blur-sm flex items-center justify-center z-50 p-4">
      <div class="bg-white rounded-2xl max-w-md w-full shadow-2xl p-6 transform transition-all animate-fade-in">
        <h3 class="text-xl font-bold text-gray-900 mb-4 flex items-center gap-2">📖 新增课程配置</h3>
        
        <form @submit.prevent="submitForm" class="space-y-4">
          <div>
            <label class="block text-xs font-bold text-gray-700 uppercase mb-1">课程名称 *</label>
            <input v-model="form.name" type="text" required placeholder="如：高等数学" class="w-full px-4 py-2 border rounded-xl focus:ring-2 focus:ring-indigo-400 outline-none">
          </div>
          <div class="grid grid-cols-2 gap-4">
            <div>
              <label class="block text-xs font-bold text-gray-700 uppercase mb-1">任课老师</label>
              <input v-model="form.teacher" type="text" placeholder="张教授" class="w-full px-4 py-2 border rounded-xl focus:ring-2 focus:ring-indigo-400 outline-none">
            </div>
            <div>
              <label class="block text-xs font-bold text-gray-700 uppercase mb-1">上课教室</label>
              <input v-model="form.room" type="text" placeholder="教A-302" class="w-full px-4 py-2 border rounded-xl focus:ring-2 focus:ring-indigo-400 outline-none">
            </div>
          </div>
          <div class="grid grid-cols-2 gap-4">
            <div>
              <label class="block text-xs font-bold text-gray-700 uppercase mb-1">上课星期 *</label>
              <select v-model="form.day" class="w-full px-4 py-2 border rounded-xl focus:ring-2 focus:ring-indigo-400 outline-none">
                <option v-for="d in days" :key="d.value" :value="d.value">{{ d.label }}</option>
              </select>
            </div>
            <div>
              <label class="block text-xs font-bold text-gray-700 uppercase mb-1">上课节次 *</label>
              <select v-model="form.slot" class="w-full px-4 py-2 border rounded-xl focus:ring-2 focus:ring-indigo-400 outline-none">
                <option v-for="(_, idx) in timeSlots" :key="idx" :value="idx + 1">第 {{ idx + 1 }} 节</option>
              </select>
            </div>
          </div>
          <div>
            <label class="block text-xs font-bold text-gray-700 uppercase mb-1">课程类型</label>
            <div class="flex gap-4 mt-1">
              <label class="flex items-center gap-2 text-sm cursor-pointer"><input type="radio" v-model="form.type" value="required" class="text-indigo-600"> 必修</label>
              <label class="flex items-center gap-2 text-sm cursor-pointer"><input type="radio" v-model="form.type" value="elective" class="text-indigo-600"> 选修</label>
            </div>
          </div>

          <div class="flex justify-end gap-3 mt-6 pt-4 border-t">
            <button type="button" @click="isModalOpen = false" class="px-4 py-2 text-gray-500 hover:bg-gray-100 rounded-xl transition-colors">取消</button>
            <button type="submit" class="px-5 py-2 bg-indigo-600 text-white rounded-xl font-bold hover:bg-indigo-700 transition-colors">确认保存</button>
          </div>
        </form>
      </div>
    </div>

  </div>
</template>

<script setup>
import { ref } from 'vue'

// 星期定义结构
const days = [
  { label: '周一', value: 1 },
  { label: '周二', value: 2 },
  { label: '周三', value: 3 },
  { label: '周四', value: 4 },
  { label: '周五', value: 5 },
]

// 节次时间映射表
const timeSlots = [
  { start: '08:00', end: '09:35' },
  { start: '10:05', end: '11:40' },
  { start: '14:00', end: '15:35' },
  { start: '16:05', end: '17:40' },
  { start: '19:00', end: '20:35' },
]

// 预填初始课程 mock 数据
const courses = ref([
  { id: 1, name: '计算机网络', teacher: '王老师', room: '信息楼501', day: 1, slot: 1, type: 'required' },
  { id: 2, name: '高等数学', teacher: '李教授', room: '大礼堂', day: 1, slot: 2, type: 'required' },
  { id: 3, name: '大学英语', teacher: 'Sarah', room: '外语楼202', day: 2, slot: 2, type: 'required' },
  { id: 4, name: '人工智能导论', teacher: '张博士', room: '实验楼301', day: 3, slot: 3, type: 'elective' },
  { id: 5, name: 'Python程序设计', teacher: '刘老师', room: '机房4B', day: 4, slot: 1, type: 'required' },
  { id: 6, name: '音乐鉴赏', teacher: '陈大师', room: '艺术楼101', day: 5, slot: 4, type: 'elective' },
])

// 弹窗状态与表单状态
const isModalOpen = ref(false)
const form = ref({
  name: '',
  teacher: '',
  room: '',
  day: 1,
  slot: 1,
  type: 'required'
})

// 根据星期和节次过滤当前格子是否有课
const getCourse = (day, slot) => {
  return courses.value.find(c => c.day === day && c.slot === slot)
}

// 提交新表单
const submitForm = () => {
  // 简单排课冲突检查
  const isConflict = courses.value.some(c => c.day === form.value.day && c.slot === form.value.slot)
  if (isConflict) {
    alert('⚠️ 该时间段已经安排了其他课程！')
    return
  }

  courses.value.push({
    id: Date.now(),
    ...form.value
  })

  // 重置表单并关闭弹窗
  form.value = { name: '', teacher: '', room: '', day: 1, slot: 1, type: 'required' }
  isModalOpen = false
}

// 删除课程
const deleteCourse = (day, slot) => {
  if(confirm("确定要删除这节课程吗？")) {
    courses.value = courses.value.filter(c => !(c.day === day && c.slot === slot))
  }
}
</script>

<style scoped>
@keyframes fadeIn {
  from { opacity: 0; transform: scale(0.95); }
  to { opacity: 1; transform: scale(1); }
}
.animate-fade-in {
  animation: fadeIn 0.15s ease-out forwards;
}
</style>
