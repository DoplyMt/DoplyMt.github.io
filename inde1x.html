<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>前端开发知识库</title>
    <!-- 引入 Vue 3 -->
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; color: #333; background-color: #f8f9fa; display: flex; height: 100vh; overflow: hidden; }
        
        #app { display: flex; width: 100%; height: 100%; }

        /* 左侧侧边栏 */
        .sidebar { width: 280px; background: #fff; border-right: 1px solid #e9ecef; display: flex; flex-direction: column; }
        .sidebar-header { padding: 20px; border-bottom: 1px solid #e9ecef; }
        .sidebar-header h2 { font-size: 18px; margin-bottom: 10px; color: #2c3e50; }
        .search-input { width: 100%; padding: 8px 12px; border: 1px solid #ced4da; border-radius: 6px; outline: none; }
        .search-input:focus { border-color: #42b883; }

        /* 文档列表 */
        .doc-list { flex: 1; overflow-y: auto; padding: 10px; list-style: none; }
        .doc-item { padding: 12px 15px; border-radius: 6px; cursor: pointer; margin-bottom: 4px; font-size: 14px; transition: all 0.2s; }
        .doc-item:hover { background-color: #f1f3f5; }
        .doc-item.active { background-color: #e8f5e9; color: #42b883; font-weight: bold; }
        .no-results { padding: 20px; color: #868e96; text-align: center; font-size: 14px; }

        /* 右侧内容区 */
        .main-content { flex: 1; padding: 40px 60px; overflow-y: auto; background: #fff; }
        .doc-title { font-size: 28px; margin-bottom: 20px; color: #2c3e50; border-bottom: 2px solid #42b883; padding-bottom: 10px; }
        .doc-meta { font-size: 13px; color: #868e96; margin-bottom: 30px; }
        .doc-body { line-height: 1.8; font-size: 16px; color: #4f5959; white-space: pre-line; } /* pre-line 保持换行 */
    </style>
</head>
<body>

    <div id="app">
        <!-- 左侧栏：搜索与目录 -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2>📚 前端知识库</h2>
                <!-- v-model：双向绑定输入框的值 -->
                <input 
                    type="text" 
                    v-model="searchQuery" 
                    class="search-input" 
                    placeholder="输入关键字搜索文档..."
                >
            </div>
            
            <ul class="doc-list">
                <!-- v-for：循环渲染过滤后的文档列表 -->
                <!-- :class：动态绑定样式，当前选中的文档高亮 -->
                <li 
                    v-for="doc in filteredDocs" 
                    :key="doc.id" 
                    class="doc-item"
                    :class="{ active: currentDoc.id === doc.id }"
                    @click="selectDoc(doc)"
                >
                    {{ doc.title }}
                </li>
                <li v-if="filteredDocs.length === 0" class="no-results">没有找到相关文档</li>
            </ul>
        </aside>

        <!-- 右侧栏：文档内容展示 -->
        <main class="main-content">
            <article v-if="currentDoc">
                <h1 class="doc-title">{{ currentDoc.title }}</h1>
                <div class="doc-meta">分类: <strong>{{ currentDoc.category }}</strong> | 最后更新: 2026年</div>
                <div class="doc-body">{{ currentDoc.content }}</div>
            </article>
        </main>
    </div>

    <script>
        const { createApp, ref, computed } = Vue

        createApp({
            setup() {
                // 1. 模拟的知识库数据源
                const docs = ref([
                    {
                        id: 1,
                        title: 'HTML5 基础核心标签',
                        category: 'HTML',
                        content: 'HTML (HyperText Markup Language) 是构建网页结构的基础。\n\n核心标签包括：\n- <header>、<footer>：页眉和页脚\n- <nav>：导航链接区域\n- <article>：独立的内容块\n- <section>：文档中的节段\n\n良好的语义化标签有助于 SEO（搜索引擎优化）以及屏幕阅读器的读取。'
                    },
                    {
                        id: 2,
                        title: 'CSS Flexbox 弹性盒子布局',
                        category: 'CSS',
                        content: 'Flexbox 是现代网页排版的神器。\n\n常用属性：\n1. display: flex; 开启弹性布局\n2. justify-content: center; 主轴居中（横向）\n3. align-items: center; 交叉轴居中（纵向）\n4. flex-direction: column; 改变主轴方向为垂直。\n\n学会了 Flexbox，你可以轻松应对 90% 的网页居中和对齐需求。'
                    },
                    {
                        id: 3,
                        title: 'JavaScript 异步编程 (Promise)',
                        category: 'JavaScript',
                        content: 'JavaScript 是单线程的，异步编程至关重要。\n\nPromise 有三种状态：\n- Pending（进行中）\n- Fulfilled（已成功）\n- Rejected（已失败）\n\n现代 JS 更推荐使用 async/await 语法糖，它能让你用写同步代码的方式来写异步逻辑，极大提高了代码的可读性。'
                    },
                    {
                        id: 4,
                        title: 'Vue 3 组合式 API (Composition API)',
                        category: 'Vue',
                        content: 'Vue 3 引入了 setup() 和组合式 API，解决了 Vue 2 在大型项目中代码逻辑分散的问题。\n\n核心点：\n- ref()：用于定义基本数据类型的响应式数据（如数字、字符串）。在 JS 中修改需要用 .value，在模板中直接使用。\n- reactive()：用于定义复杂的对象或数组响应式数据。\n- computed()：计算属性，会根据依赖自动缓存，性能极佳。'
                    }
                ])

                // 2. 搜索框绑定的变量
                const searchQuery = ref('')

                // 3. 当前正在右侧查看的文档（默认选中第一篇）
                const currentDoc = ref(docs.value[0])

                // 4. 计算属性：根据搜索框输入的文字，实时过滤左侧列表
                const filteredDocs = computed(() => {
                    return docs.value.filter(doc => {
                        return doc.title.toLowerCase().includes(searchQuery.value.toLowerCase()) ||
                               doc.content.toLowerCase().includes(searchQuery.value.toLowerCase())
                    })
                })

                // 5. 点击左侧列表切换文章的方法
                const selectDoc = (doc) => {
                    currentDoc.value = doc
                }

                return {
                    searchQuery,
                    currentDoc,
                    filteredDocs,
                    selectDoc
                }
            }
        }).mount('#app')
    </script>
</body>
</html>
